## SonarQube/SonarCloud project configuration
# NOTE: Replace the placeholders with your actual project and organization keys.
# See https://docs.sonarcloud.io for detailed configuration options.

sonar.projectKey=YOUR_PROJECT_KEY
sonar.organization=YOUR_ORGANIZATION_KEY

# Project metadata
sonar.projectName=Otedama Mining Pool
sonar.projectVersion=1.0

# Source code directories (comma-separated)
sonar.sources=src

# File exclusions (tests, generated code, etc.)
sonar.exclusions=**/*.spec.ts,**/__tests__/**,**/node_modules/**

# Language configuration
sonar.language=ts
sonar.typescript.tsconfigPath=tsconfig.json

# Tests and coverage (if using Jest or another tool, point to coverage report)
sonar.tests=src
sonar.test.inclusions=**/*.spec.ts
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8
