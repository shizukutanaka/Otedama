name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm test

    - name: Build application
      run: npm run build:prod

    - name: Build distributables
      run: |
        if [ "$RUNNER_OS" == "Linux" ]; then
          npm run dist:linux
        elif [ "$RUNNER_OS" == "Windows" ]; then
          npm run dist:win
        elif [ "$RUNNER_OS" == "macOS" ]; then
          npm run dist:mac
        fi
      shell: bash

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist-${{ matrix.os }}
        path: build/

  release:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Otedama ${{ github.ref }}
        body: |
          ## 🌟 Otedama Release ${{ github.ref }}
          
          ### ✨ What's New
          - Automatic release from GitHub Actions
          - Cross-platform builds (Windows, macOS, Linux)
          - Full test coverage validation
          
          ### 📦 Downloads
          - **Windows**: `Otedama-Setup-x.x.x.exe`
          - **macOS**: `Otedama-x.x.x.dmg`
          - **Linux**: `Otedama-x.x.x.AppImage`
          
          ### 🚀 Installation
          1. Download the appropriate file for your OS
          2. Run the installer
          3. Follow the setup wizard
          4. Start mining with zero fees!
          
          ### 🔒 Security
          All releases are automatically built and signed.
          Verify checksums before installation.
          
          **Full Changelog**: https://github.com/shizukutanaka/Otedama/compare/v2.0.0...v2.1.0
        draft: false
        prerelease: false

    - name: Upload Release Assets
      run: |
        for file in dist-*/build/*; do
          if [ -f "$file" ]; then
            echo "Uploading $file"
            gh release upload ${{ github.ref }} "$file"
          fi
        done
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: shizukutanaka/otedama

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
