# Otedama Production Docker Compose Configuration
# Supports development, staging, and production environments

version: '3.8'

services:
  # Main Otedama service
  otedama:
    build: 
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_DATE: ${BUILD_DATE:-2025-01-15}
        VCS_REF: ${VCS_REF:-main}
        VERSION: ${VERSION:-0.6.0}
    image: otedama:${VERSION:-latest}
    container_name: otedama-main
    hostname: otedama-pool
    restart: unless-stopped
    
    # Environment variables
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - OTEDAMA_VERSION=${VERSION:-0.6.0}
      - WALLET_ADDRESS=${WALLET_ADDRESS}
      - CURRENCY=${CURRENCY:-RVN}
      - THREADS=${THREADS:-0}
      - POOL_NAME=${POOL_NAME:-Otedama Docker Pool}
      
    # Port mappings
    ports:
      - "${WEB_PORT:-8080}:8080"           # Web dashboard
      - "${STRATUM_PORT:-3333}:3333"       # Stratum mining
      - "${P2P_PORT:-8333}:8333"           # P2P network
      
    # Volume mappings for persistence
    volumes:
      - otedama-data:/app/data             # Database and mining data
      - otedama-logs:/app/logs             # Application logs
      - otedama-config:/app/config         # Configuration files
      - ${CONFIG_PATH:-./otedama.json}:/app/otedama.json:ro  # Main config
      
    # Resource limits
    deploy:
      resources:
        limits:
          memory: ${MEMORY_LIMIT:-512M}
          cpus: '${CPU_LIMIT:-2.0}'
        reservations:
          memory: 128M
          cpus: '0.5'
          
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
      
    # Security settings
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
      
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        
    # Network configuration
    networks:
      - otedama-network
      - monitoring
      
    # Dependencies
    depends_on:
      redis:
        condition: service_healthy
      prometheus:
        condition: service_started
        
    # Labels for management
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.otedama.rule=Host(`${DOMAIN:-localhost}`)"
      - "traefik.http.routers.otedama.tls=true"
      - "traefik.http.services.otedama.loadbalancer.server.port=8080"
      - "com.docker.compose.service=otedama"
      - "com.otedama.version=0.6.0"

  # Redis for caching and session management
  redis:
    image: redis:7-alpine
    container_name: otedama-redis
    hostname: otedama-redis
    restart: unless-stopped
    
    command: [
      "redis-server",
      "--appendonly", "yes",
      "--appendfsync", "everysec", 
      "--maxmemory", "256mb",
      "--maxmemory-policy", "allkeys-lru"
    ]
    
    volumes:
      - otedama-redis:/data
      
    networks:
      - otedama-network
      
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
          cpus: '0.1'

  # Nginx reverse proxy and load balancer
  nginx:
    image: nginx:alpine
    container_name: otedama-nginx
    hostname: otedama-nginx
    restart: unless-stopped
    
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
      
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - otedama-ssl:/etc/nginx/ssl:ro
      - otedama-logs:/var/log/nginx
      
    networks:
      - otedama-network
      
    depends_on:
      - otedama
      
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      
    labels:
      - "com.docker.compose.service=nginx"

  # Prometheus monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: otedama-prometheus
    hostname: otedama-prometheus
    restart: unless-stopped
    
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
      
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - otedama-prometheus:/prometheus
      
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
      
    networks:
      - monitoring
      
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M
          cpus: '0.2'

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: otedama-grafana
    hostname: otedama-grafana
    restart: unless-stopped
    
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
      
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
      
    volumes:
      - otedama-grafana:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      
    networks:
      - monitoring
      
    depends_on:
      - prometheus
      
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
          cpus: '0.1'

  # Alertmanager for notifications
  alertmanager:
    image: prom/alertmanager:latest
    container_name: otedama-alertmanager
    hostname: otedama-alertmanager
    restart: unless-stopped
    
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
      
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - otedama-alertmanager:/alertmanager
      
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
      
    networks:
      - monitoring
      
    depends_on:
      - prometheus

  # Watchtower for automatic updates
  watchtower:
    image: containrrr/watchtower
    container_name: otedama-watchtower
    restart: unless-stopped
    
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=3600
      - WATCHTOWER_INCLUDE_RESTARTING=true
      
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      
    command: --interval 3600 --cleanup
    
    networks:
      - otedama-network
      
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.1'
        reservations:
          memory: 16M
          cpus: '0.05'

# Named volumes for data persistence
volumes:
  otedama-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR:-./data}
      
  otedama-logs:
    driver: local
    driver_opts:
      type: none 
      o: bind
      device: ${LOGS_DIR:-./logs}
      
  otedama-config:
    driver: local
    
  otedama-redis:
    driver: local
    
  otedama-ssl:
    driver: local
    
  otedama-prometheus:
    driver: local
    
  otedama-grafana:
    driver: local
    
  otedama-alertmanager:
    driver: local

# Networks
networks:
  otedama-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
    labels:
      - "com.otedama.network=main"
      
  monitoring:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
    labels:
      - "com.otedama.network=monitoring"

# Global configuration
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-restart-policy: &default-restart-policy
  restart_policy:
    condition: unless-stopped
    delay: 5s
    max_attempts: 3
    window: 120s
