version: '3.8'

services:
  # Main Otedama application
  otedama:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: otedama-commercial
    restart: unless-stopped
    
    # Port mappings
    ports:
      - "3333:3333"   # Stratum mining port
      - "8080:8080"   # API/Dashboard
      - "8333:8333"   # P2P network
      - "9090:9090"   # Metrics API
    
    # Volume mounts for persistence
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./otedama.json:/app/otedama.json:ro
    
    # Environment variables
    environment:
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=2048
      - OPERATOR_BTC_ADDRESS=bc1qxy2kgdygjrsqtzq2n0yrf2493p83kkfjhx0wlh
      - OPERATOR_FEE_RATE=0.001
    
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 1G
          cpus: '0.5'
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    
    # Dependencies
    depends_on:
      - prometheus
      - grafana
    
    # Network
    networks:
      - otedama-network

  # Prometheus monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: otedama-prometheus
    restart: unless-stopped
    
    ports:
      - "9091:9090"
    
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=90d'
      - '--web.enable-lifecycle'
    
    networks:
      - otedama-network

  # Grafana dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: otedama-grafana
    restart: unless-stopped
    
    ports:
      - "3000:3000"
    
    volumes:
      - ./monitoring/grafana:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=otedama123
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
      - GF_SERVER_ROOT_URL=http://localhost:3000
    
    networks:
      - otedama-network

  # Redis for caching (optional)
  redis:
    image: redis:7-alpine
    container_name: otedama-redis
    restart: unless-stopped
    
    ports:
      - "6379:6379"
    
    volumes:
      - redis-data:/data
    
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    
    networks:
      - otedama-network

  # Nginx reverse proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: otedama-nginx
    restart: unless-stopped
    
    ports:
      - "80:80"
      - "443:443"
    
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    
    depends_on:
      - otedama
      - grafana
    
    networks:
      - otedama-network

# Networks
networks:
  otedama-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# Volumes for data persistence
volumes:
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  redis-data:
    driver: local

# Additional services for advanced setups
x-development-services:
  # PostgreSQL for advanced analytics
  postgres:
    image: postgres:15-alpine
    container_name: otedama-postgres
    restart: unless-stopped
    
    environment:
      - POSTGRES_DB=otedama
      - POSTGRES_USER=otedama
      - POSTGRES_PASSWORD=otedama123
    
    volumes:
      - postgres-data:/var/lib/postgresql/data
    
    networks:
      - otedama-network

  # Elasticsearch for log analysis
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.8.0
    container_name: otedama-elasticsearch
    restart: unless-stopped
    
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    
    networks:
      - otedama-network

x-additional-volumes:
  postgres-data:
    driver: local
  elasticsearch-data:
    driver: local
