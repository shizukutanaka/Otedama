version: '3.8'

services:
  # Enhanced Otedama Mining Pool
  otedama:
    build:
      context: .
      dockerfile: Dockerfile.enhanced
      args:
        BUILD_DATE: ${BUILD_DATE:-$(date -u +'%Y-%m-%dT%H:%M:%SZ')}
        VCS_REF: ${VCS_REF:-$(git rev-parse --short HEAD)}
        VERSION: 0.6.1-enhanced
    image: otedama:0.6.1-enhanced
    container_name: otedama-pool
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3333
      - API_PORT=8080
      - WALLET_ADDRESS=${WALLET_ADDRESS}
      - POOL_NAME=${POOL_NAME:-Otedama Enhanced Pool}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    ports:
      - "3333:3333"     # Stratum port
      - "8080:8080"     # Web/API port
    volumes:
      - otedama-data:/app/data
      - otedama-logs:/app/logs
      - otedama-backups:/app/backups
    networks:
      - otedama-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    labels:
      - "com.otedama.service=pool"
      - "com.otedama.version=0.6.1-enhanced"

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: otedama-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - otedama-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL for advanced features (optional)
  postgres:
    image: postgres:15-alpine
    container_name: otedama-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=otedama
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-otedama}
      - POSTGRES_DB=otedama
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - otedama-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U otedama"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - full

  # Nginx reverse proxy with SSL
  nginx:
    image: nginx:alpine
    container_name: otedama-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-cache:/var/cache/nginx
      - letsencrypt:/etc/letsencrypt:ro
    networks:
      - otedama-net
    depends_on:
      - otedama

  # Certbot for SSL certificates
  certbot:
    image: certbot/certbot
    container_name: otedama-certbot
    volumes:
      - letsencrypt:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    profiles:
      - ssl

  # Monitoring stack
  prometheus:
    image: prom/prometheus:latest
    container_name: otedama-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    ports:
      - "9090:9090"
    networks:
      - otedama-net
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: otedama-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    networks:
      - otedama-net
    depends_on:
      - prometheus
    profiles:
      - monitoring

  # Backup service
  backup:
    image: offen/docker-volume-backup:latest
    container_name: otedama-backup
    restart: unless-stopped
    environment:
      - BACKUP_CRON_EXPRESSION=${BACKUP_SCHEDULE:-0 2 * * *}
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-7}
      - BACKUP_FILENAME=otedama-backup-%Y-%m-%d.tar.gz
      - AWS_S3_BUCKET_NAME=${S3_BUCKET}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    volumes:
      - otedama-data:/backup/data:ro
      - postgres-data:/backup/postgres:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - otedama-net
    profiles:
      - backup

networks:
  otedama-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  otedama-data:
  otedama-logs:
  otedama-backups:
  redis-data:
  postgres-data:
  prometheus-data:
  grafana-data:
  nginx-cache:
  letsencrypt: